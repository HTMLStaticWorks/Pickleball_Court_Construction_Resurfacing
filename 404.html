<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found | PicklePro</title>
    <!-- Favicon -->
    <link rel='icon' type='image/png' href='assets/images/favicon.png'>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-body) 100%);
        }
        .error-code {
            font-size: 10rem;
            line-height: 1;
            font-weight: 800;
            background: linear-gradient(var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    
    <!-- Controls -->
    <div class="position-fixed top-0 end-0 p-3 d-flex align-items-center" style="z-index: 1050;">
        <button class="mobile-control-btn theme-toggle-mobile me-2" id="theme-toggle">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button class="mobile-control-btn rtl-toggle-mobile" id="rtl-toggle">
            RTL
        </button>
    </div>

    <div class="error-container">
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="error-code">404</div>
                    <h1 class="display-4 fw-bold mb-4">Out of Bounds!</h1>
                    <p class="lead text-muted mb-5">Oops! It looks like the page you are looking for has been hit out of the court. Let's get you back in the game and serving again.</p>
                    <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                        <a href="index.html" class="btn btn-primary btn-lg px-5 shadow-lg">Return to Court</a>
                        <a href="contact.html" class="btn btn-outline-secondary btn-lg px-5">Contact Support</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
