<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PicklePro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100 py-5">
            <div class="col-md-6">
                <div class="card p-4 p-md-5 border-0 shadow-lg rounded-4">
                    <div class="text-center mb-4">
                        <a href="index.html" class="navbar-brand d-inline-flex align-items-center mb-3">
                            <i class="bi bi-trophy-fill me-2 text-primary fs-2"></i>
                            <span class="fs-2 fw-bold text-secondary">PicklePro</span>
                        </a>
                        <h3>Create Your Account</h3>
                        <p class="text-muted">Join the premier pickleball construction network.</p>
                    </div>

                    <form action="dashboard.html">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" placeholder="John" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" placeholder="Doe" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="col-12">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="terms" required>
                                    <label class="form-check-label" for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
                                </div>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 btn-lg">Create Account</button>
                            </div>
                        </div>
                    </form>

                    <div class="text-center my-4">
                        <span class="bg-white px-2 text-muted small position-relative" style="z-index: 1;">OR REGISTER WITH</span>
                        <hr class="mt-n2">
                    </div>

                    <div class="row g-2 mb-4">
                        <div class="col-6">
                            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center">
                                <i class="bi bi-google me-2"></i> Google
                            </button>
                        </div>
                        <div class="col-6">
                            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center">
                                <i class="bi bi-facebook me-2"></i> Facebook
                            </button>
                        </div>
                    </div>

                    <p class="text-center mb-0">Already have an account? <a href="login.html" class="fw-bold">Login</a></p>
                </div>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-decoration-none text-muted"><i class="bi bi-arrow-left"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
