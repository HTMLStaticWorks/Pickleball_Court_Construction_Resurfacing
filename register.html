<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PicklePro</title>
    <!-- Favicon -->
    <link rel='icon' type='image/png' href='assets/images/favicon.png'>
    <link rel='apple-touch-icon' href='assets/images/favicon.png'>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); }
        [data-bs-theme="dark"] body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="bg-light">
    <!-- Controls -->
    <div class="position-fixed top-0 end-0 p-3 d-flex align-items-center" style="z-index: 1050;">
        <button class="mobile-control-btn theme-toggle-mobile me-2" id="theme-toggle">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button class="mobile-control-btn rtl-toggle-mobile" id="rtl-toggle">
            RTL
        </button>
    </div>
    
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100 py-5">
            <div class="col-11 col-sm-10 col-md-9 col-lg-6">
                <div class="card p-4 p-md-5 border-0 shadow-lg rounded-4">
                    <div class="text-center mb-4">
                        <a href="index.html" class="brand-identity mb-4">
                            <i class="bi bi-trophy-fill"></i>
                            <span>PicklePro</span>
                        </a>
                        <h3 class="fw-bold">Create Your Account</h3>
                        <p class="text-muted">Join the premier pickleball construction network.</p>
                    </div>

                    <form action="index.html">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">First Name</label>
                                <input type="text" class="form-control form-control-lg" placeholder="John" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Last Name</label>
                                <input type="text" class="form-control form-control-lg" placeholder="Doe" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Email Address</label>
                                <input type="email" class="form-control form-control-lg" placeholder="name@example.com" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Password</label>
                                <div class="position-relative">
                                    <input type="password" class="form-control form-control-lg pe-5" placeholder="••••••••" id="passwordInput" required>
                                    <button type="button" class="btn border-0 position-absolute end-0 top-50 translate-middle-y me-2 shadow-none text-muted password-toggle" data-target="passwordInput">
                                        <i class="bi bi-eye-slash"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Confirm Password</label>
                                <div class="position-relative">
                                    <input type="password" class="form-control form-control-lg pe-5" placeholder="••••••••" id="confirmPasswordInput" required>
                                    <button type="button" class="btn border-0 position-absolute end-0 top-50 translate-middle-y me-2 shadow-none text-muted password-toggle" data-target="confirmPasswordInput">
                                        <i class="bi bi-eye-slash"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-check p-3 border rounded-3 bg-light">
                                    <input type="checkbox" class="form-check-input ms-0 me-2" id="terms" required>
                                    <label class="form-check-label small fw-semibold" for="terms">I agree to the <a href="#" class="text-primary text-decoration-none">Terms & Conditions</a></label>
                                </div>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm py-3">Create Account</button>
                            </div>
                        </div>
                    </form>

                    <div class="text-center my-4 position-relative">
                        <hr>
                        <span class="px-3 text-muted small position-absolute top-50 start-50 translate-middle" style="z-index: 1; background-color: var(--bg-card);">OR REGISTER WITH</span>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-sm-6">
                            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center py-3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48" class="me-2">
                                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                                </svg> Google
                            </button>
                        </div>
                        <div class="col-12 col-sm-6">
                            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center py-3">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 384 512" class="me-2">
                                    <path fill="currentColor" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 21.8-88.5 21.8-11.4 0-51.1-20.8-83.6-20.8-42.3 0-83.2 24.3-104.5 61.4C-23.7 265 14.1 366.1 57 428.2c21 30.5 45.9 64.6 78.8 63.4 32-1.2 44.1-20.6 82.8-20.6 38.6 0 50 20.6 82.8 20.6 33.5 1.2 58.3-34.1 79.3-64.7 24.1-35.4 33.9-69.7 34.2-71.4-1-.3-65.7-25.2-66.4-100.8zM245.6 100c19-23 32-55 28.5-86.7-27.5 1.1-60.9 18.2-80.6 41.1-17.7 20.4-33.1 53.4-29.1 84 30.2 2.4 61.5-14.5 81.2-38.4z"/>
                                </svg> Apple
                            </button>
                        </div>
                    </div>

                    <p class="text-center mb-0 text-muted">Already have an account? <a href="login.html" class="fw-bold text-primary text-decoration-none">Login</a></p>
                </div>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-decoration-none text-muted fw-semibold"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
