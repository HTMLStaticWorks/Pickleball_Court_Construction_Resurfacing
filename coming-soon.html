<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | PicklePro</title>
    <!-- Favicon -->
    <link rel='icon' type='image/png' href='assets/images/favicon.png'>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .coming-soon-bg {
            background: linear-gradient(rgba(26, 42, 108, 0.85), rgba(26, 42, 108, 0.85)), url('assets/images/hero-bg.png');
            background-size: cover;
            background-position: center;
            color: #fff;
        }
    </style>
</head>
<body>
    
    <div class="coming-soon-bg min-vh-100 d-flex align-items-center">
        <div class="container text-center">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <a href="index.html" class="navbar-brand d-inline-flex align-items-center mb-5">
                        <i class="bi bi-trophy-fill me-2 text-primary fs-1"></i>
                        <span class="fs-1 fw-bold text-white">PicklePro</span>
                    </a>
                    <h1 class="display-3 fw-bold mb-4">Something Great is Coming</h1>
                    <p class="lead mb-5 opacity-75">We are currently surfacing our new digital platform. Stay tuned for the ultimate pickleball court experience.</p>
                    
                    <div class="row g-3 justify-content-center mb-5">
                        <div class="col-3 col-md-2">
                            <div class="bg-white bg-opacity-10 p-3 rounded-4">
                                <h2 class="mb-0">14</h2>
                                <small>Days</small>
                            </div>
                        </div>
                        <div class="col-3 col-md-2">
                            <div class="bg-white bg-opacity-10 p-3 rounded-4">
                                <h2 class="mb-0">08</h2>
                                <small>Hours</small>
                            </div>
                        </div>
                        <div class="col-3 col-md-2">
                            <div class="bg-white bg-opacity-10 p-3 rounded-4">
                                <h2 class="mb-0">45</h2>
                                <small>Mins</small>
                            </div>
                        </div>
                    </div>

                    <div class="row justify-content-center">
                        <div class="col-md-6">
                            <p class="mb-3">Notify me when we launch:</p>
                            <form class="input-group">
                                <input type="email" class="form-control form-control-lg border-0" placeholder="Email Address">
                                <button class="btn btn-primary btn-lg" type="submit">Notify Me</button>
                            </form>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-4 mt-5">
                        <a href="#" class="text-white opacity-75"><i class="bi bi-facebook fs-3"></i></a>
                        <a href="#" class="text-white opacity-75"><i class="bi bi-instagram fs-3"></i></a>
                        <a href="#" class="text-white opacity-75"><i class="bi bi-linkedin fs-3"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
