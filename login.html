<!DOCTYPE html>
<html lang="en" dir="ltr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PicklePro</title>
    <!-- Favicon -->
    <link rel='icon' type='image/png' href='assets/images/favicon.png'>
    <link rel='apple-touch-icon' href='assets/images/favicon.png'>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); }
        [data-bs-theme="dark"] body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="bg-light">
    <!-- Controls -->
    <div class="position-fixed top-0 end-0 p-3 d-flex align-items-center" style="z-index: 1050;">
        <button class="mobile-control-btn theme-toggle-mobile me-2" id="theme-toggle">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button class="mobile-control-btn rtl-toggle-mobile" id="rtl-toggle">
            RTL
        </button>
    </div>
    
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100 py-5">
            <div class="col-11 col-sm-10 col-md-8 col-lg-5">
                <div class="card p-4 p-md-5 border-0 shadow-lg rounded-4">
                    <div class="text-center mb-4">
                        <a href="index.html" class="brand-identity mb-4">
                            <i class="bi bi-trophy-fill"></i>
                            <span>PicklePro</span>
                        </a>
                        <h3 class="fw-bold">Welcome Back</h3>
                        <p class="text-muted">Login to manage your court project.</p>
                    </div>

                    <form action="index.html">
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Email Address</label>
                            <input type="email" class="form-control form-control-lg" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="position-relative">
                                <input type="password" class="form-control form-control-lg pe-5" placeholder="••••••••" id="passwordInput" required>
                                <button type="button" class="btn border-0 position-absolute end-0 top-50 translate-middle-y me-2 shadow-none text-muted password-toggle" data-target="passwordInput">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label small" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-decoration-none small fw-bold text-primary">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3 shadow-sm py-3">Login</button>
                    </form>

                    <div class="text-center my-4 position-relative">
                        <hr>
                        <span class="px-3 text-muted small position-absolute top-50 start-50 translate-middle" style="z-index: 1; background-color: var(--bg-card);">OR LOGIN WITH</span>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12 col-sm-6">
                            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center py-3">
                                <i class="bi bi-google fs-5 me-2 text-danger"></i> Google
                            </button>
                        </div>
                        <div class="col-12 col-sm-6">
                            <button class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center py-3">
                                <i class="bi bi-facebook fs-5 me-2 text-primary"></i> Facebook
                            </button>
                        </div>
                    </div>

                    <p class="text-center mb-0 text-muted">Don't have an account? <a href="register.html" class="fw-bold text-primary text-decoration-none">Sign Up</a></p>
                </div>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-decoration-none text-muted fw-semibold"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
